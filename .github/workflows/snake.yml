# Generates a snake game animation from your GitHub contribution graph
# Runs daily and on push; outputs to a dedicated `output` branch

name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"     # runs once a day at midnight UTC
  workflow_dispatch:          # lets you trigger manually from Actions tab
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: adhirajsen97
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
